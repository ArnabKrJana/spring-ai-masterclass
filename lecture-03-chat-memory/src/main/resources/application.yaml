spring:
  application:
    name: lecture-03-chat-memory

  # Explicitly define the connection so the schema initializer can run immediately
  datasource:
    url: jdbc:postgresql://localhost:5432/ai_chat_memory_db?timezone=Asia/Kolkata
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver

  ai:
    # 1. Ollama-specific configuration
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: gemma4:e2b

    # 2. Global Spring AI Chat Memory configuration
    chat:
      memory:
        repository:  # <--- THIS IS THE BLOCK I ACCIDENTALLY REMOVED!
          jdbc:
            initialize-schema: always

logging:
  level:
    org.springframework.ai.chat.client.advisor.SimpleLoggerAdvisor: DEBUG