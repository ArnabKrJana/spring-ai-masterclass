<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spring AI Knowledge Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            bg: '#f8faf9',
                            card: '#ffffff',
                            primary: '#059669',     /* Emerald 600 */
                            primaryHover: '#047857',/* Emerald 700 */
                            accent: '#e6f4ea',      /* Light Mint */
                            text: '#1f2937',        /* Gray 800 */
                            muted: '#6b7280'        /* Gray 500 */
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Light Markdown Typography Aesthetics */
        .markdown-content p { margin-bottom: 0.75rem; }
        .markdown-content p:last-child { margin-bottom: 0; }
        .markdown-content strong { color: #047857; font-weight: 600; }
        .markdown-content ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 0.75rem; }
        .markdown-content ol { list-style-type: decimal; margin-left: 1.5rem; margin-bottom: 0.75rem; }
        .markdown-content li { margin-bottom: 0.25rem; }
        .markdown-content code { background-color: #f3f4f6; padding: 0.2rem 0.4rem; border-radius: 4px; font-family: monospace; font-size: 0.875rem; color: #b91c1c; }
        .markdown-content pre { background-color: #1f2937; padding: 1rem; border-radius: 8px; overflow-x: auto; margin-bottom: 0.75rem; border: 1px solid #e5e7eb; }
        .markdown-content pre code { background-color: transparent; padding: 0; color: #f9fafb; }
    </style>
</head>
<body class="bg-brand-bg text-brand-text font-sans h-screen flex flex-col selection:bg-emerald-200">

<!-- Minimal Header -->
<header class="p-4 bg-brand-card border-b border-gray-200/70 flex items-center justify-between shrink-0 shadow-sm z-10">
    <div class="flex items-center gap-2">
        <!-- Green Sparkle Icon -->
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#059669" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>
        </svg>
        <h1 class="text-base font-medium tracking-wide">Knowledge Assistant</h1>
    </div>
</header>

<!-- Chat Feed Viewport (Strictly isolated scrolling region) -->
<main id="chat-window" class="flex-1 overflow-y-auto p-4 md:p-6 w-full mx-auto max-w-3xl space-y-6 scroll-smooth">
    <!-- Initial Greeting Setup -->
    <div class="flex w-full justify-start items-start gap-4">
        <div class="shrink-0 w-8 h-8 rounded-full bg-gradient-to-br from-emerald-500 to-teal-600 flex items-center justify-center shadow-sm">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
        </div>
        <div class="text-[15px] leading-relaxed w-full mt-0.5 markdown-content">
            Hello! I have loaded your profile and resume documents into the vector store. Ask me anything about your technical background, code designs, or engineering history.
        </div>
    </div>
</main>

<!-- Natural Grid Input Base Footer (Blocks out overlap completely) -->
<footer class="bg-brand-card border-t border-gray-200/80 p-4 shrink-0 shadow-[0_-4px_12px_rgba(0,0,0,0.03)] z-10">
    <div class="max-w-3xl mx-auto">
        <div class="flex items-center gap-2 bg-brand-bg rounded-[28px] pl-5 pr-2 py-1.5 focus-within:ring-2 focus-within:ring-emerald-500/20 border border-gray-200 focus-within:border-brand-primary transition-all duration-150">
            <input type="text" id="user-input" placeholder="Ask a question..."
                   class="flex-1 bg-transparent border-none outline-none text-brand-text placeholder-brand-muted text-[15px] py-1"
                   onkeydown="if(event.key === 'Enter') sendMessage()"/>
            <button onclick="sendMessage()"
                    class="p-2.5 bg-brand-primary hover:bg-brand-primaryHover text-white rounded-full transition-colors cursor-pointer flex items-center justify-center shadow-sm">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 7-7 7 7"/><path d="M12 19V5"/></svg>
            </button>
        </div>
        <p class="text-center text-[11px] text-brand-muted mt-2">Assistant can make errors. Verify technical profile references.</p>
    </div>
</footer>

<script>
    const sessionConversationId = 'session-' + Math.random().toString(36).substr(2, 9);
    const chatWindow = document.getElementById('chat-window');
    const userInput = document.getElementById('user-input');

    async function sendMessage() {
        const promptText = userInput.value.trim();
        if (!promptText) return;

        userInput.value = '';
        appendMessage(promptText, 'user');

        const loadingId = 'loading-' + Date.now();
        appendMessage('Generating response...', 'bot', loadingId);

        try {
            const response = await fetch('/rag/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    prompt: promptText,
                    conversationId: sessionConversationId
                })
            });

            if (!response.ok) throw new Error('Network error');

            const data = await response.json();
            const botBubble = document.getElementById(loadingId);
            botBubble.innerHTML = marked.parse(data.content);

            // Keep viewport snapped to updated layout boundaries
            scrollToBottom();
        } catch (error) {
            const botBubble = document.getElementById(loadingId);
            botBubble.innerText = "Error: Failed to fetch profile reference details from the database server.";
            botBubble.classList.add('text-red-600');
        }
    }

    function appendMessage(text, sender, elementId = null) {
        const wrapper = document.createElement('div');

        if (sender === 'user') {
            wrapper.className = 'flex w-full justify-end';
        } else {
            wrapper.className = 'flex w-full justify-start items-start gap-4';

            const icon = document.createElement('div');
            icon.className = 'shrink-0 w-8 h-8 rounded-full bg-gradient-to-br from-emerald-500 to-teal-600 flex items-center justify-center shadow-sm';
            icon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>';
            wrapper.appendChild(icon);
        }

        const bubble = document.createElement('div');
        if (elementId) bubble.id = elementId;

        if (sender === 'user') {
            bubble.className = 'bg-brand-accent text-emerald-950 rounded-2xl px-4 py-2.5 text-[15px] max-w-[85%] whitespace-pre-wrap shadow-sm border border-emerald-200/40';
            bubble.innerText = text;
        } else {
            bubble.className = 'text-brand-text text-[15px] leading-relaxed w-full mt-0.5 markdown-content';
            bubble.innerHTML = (text === 'Generating response...') ? text : marked.parse(text);
        }

        wrapper.appendChild(bubble);
        chatWindow.appendChild(wrapper);
        scrollToBottom();
    }

    function scrollToBottom() {
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }
</script>
</body>
</html>
