<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spring AI Agent</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600&display=swap');

        :root {
            --bg-color: #ffffff;
            --surface-color: #f8f9fa;
            --primary-red: #d93025; /* Google Red */
            --primary-red-hover: #b3261d;
            --pale-red: #fce8e6;
            --text-main: #202124;
            --text-muted: #5f6368;
            --border-color: #e0e0e0;
        }

        body {
            font-family: 'Google Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            height: 100vh;
        }

        .layout-wrapper {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
        }

        .header {
            padding: 20px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            background-color: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header h1 {
            font-size: 1.3rem;
            font-weight: 500;
            margin: 0;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        .header svg {
            fill: var(--primary-red);
            width: 24px;
            height: 24px;
        }

        .chat-container {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px 24px 120px 24px; /* Padding bottom for floating input */
            display: flex;
            flex-direction: column;
            gap: 32px;
            scroll-behavior: smooth;
        }

        /* Hide scrollbar for cleaner look */
        .chat-container::-webkit-scrollbar {
            width: 6px;
        }
        .chat-container::-webkit-scrollbar-thumb {
            background-color: rgba(0,0,0,0.1);
            border-radius: 10px;
        }

        .message-row {
            display: flex;
            width: 100%;
        }

        .message-row.user {
            justify-content: flex-end;
        }

        .message-row.ai {
            justify-content: flex-start;
            gap: 16px;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: var(--pale-red);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .avatar svg {
            width: 20px;
            height: 20px;
            fill: var(--primary-red);
        }

        .bubble {
            max-width: 80%;
            padding: 14px 20px;
            font-size: 1rem;
            line-height: 1.6;
        }

        .user .bubble {
            background-color: var(--surface-color);
            color: var(--text-main);
            border-radius: 24px 24px 4px 24px;
            border: 1px solid var(--border-color);
        }

        .ai .bubble {
            background-color: transparent;
            color: var(--text-main);
            padding: 8px 0; /* Flat look like Gemini */
            max-width: 90%;
        }

        /* Formatting inside AI response */
        .ai .bubble strong {
            color: var(--primary-red);
        }

        .input-wrapper {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px 24px 30px 24px;
            background: linear-gradient(to top, rgba(255,255,255,1) 70%, rgba(255,255,255,0));
        }

        .input-box {
            display: flex;
            align-items: center;
            background-color: var(--surface-color);
            border-radius: 32px;
            padding: 8px 12px 8px 24px;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        .input-box:focus-within {
            background-color: var(--bg-color);
            border-color: var(--primary-red);
            box-shadow: 0 4px 12px rgba(217, 48, 37, 0.15);
        }

        input[type="text"] {
            flex-grow: 1;
            border: none;
            background: transparent;
            outline: none;
            font-size: 1rem;
            color: var(--text-main);
            font-family: inherit;
        }

        input[type="text"]::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            background-color: transparent;
            border: none;
            cursor: pointer;
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background-color 0.2s;
        }

        .send-btn svg {
            fill: var(--text-muted);
            width: 24px;
            height: 24px;
            transition: fill 0.2s;
        }

        .send-btn:hover {
            background-color: var(--pale-red);
        }

        .send-btn:hover svg {
            fill: var(--primary-red);
        }

        .send-btn:disabled {
            cursor: not-allowed;
            background-color: transparent;
        }

        .send-btn:disabled svg {
            fill: #cccccc;
        }

        .thinking {
            display: none;
            align-items: center;
            gap: 8px;
            color: var(--primary-red);
            font-size: 0.9rem;
            font-weight: 500;
            padding-left: 52px; /* Align with AI text */
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
    </style>
</head>
<body>

<div class="layout-wrapper">
    <div class="header">
        <!-- Sparkle Icon -->
        <svg viewBox="0 0 24 24">
            <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-8.5 13.5l-1.5-3-3-1.5 3-1.5 1.5-3 1.5 3 3 1.5-3 1.5-1.5 3z"/>
        </svg>
        <h1>ChadGPT</h1>
    </div>

    <div class="chat-container" id="chatBox">
        <!-- Initial Greeting -->
        <div class="message-row ai">
            <div class="avatar">
                <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-8.5 13.5l-1.5-3-3-1.5 3-1.5 1.5-3 1.5 3 3 1.5-3 1.5-1.5 3z"/></svg>
            </div>
            <div class="bubble">
                Hello! I'm equipped with live tool-calling capabilities. Ask me about the current weather or when the sun sets anywhere in the world!
            </div>
        </div>

        <div class="thinking" id="thinkingIndicator">
            Executing tools... Check IDE console
        </div>
    </div>

    <div class="input-wrapper">
        <div class="input-box">
            <input type="text" id="promptInput" placeholder="Ask a question..." autocomplete="off" onkeypress="handleKeyPress(event)">
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                <!-- Send Icon -->
                <svg viewBox="0 0 24 24">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
            </button>
        </div>
    </div>
</div>

<script>
    const chatBox = document.getElementById('chatBox');
    const promptInput = document.getElementById('promptInput');
    const sendBtn = document.getElementById('sendBtn');
    const thinkingIndicator = document.getElementById('thinkingIndicator');

    // Watch for Enter key
    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            sendMessage();
        }
    }

    // Enable/Disable send button icon color based on input
    promptInput.addEventListener('input', function() {
        const svg = sendBtn.querySelector('svg');
        if(this.value.trim().length > 0) {
            svg.style.fill = 'var(--primary-red)';
        } else {
            svg.style.fill = 'var(--text-muted)';
        }
    });

    async function sendMessage() {
        const prompt = promptInput.value.trim();
        if (!prompt) return;

        // Add User Message
        appendUserMessage(prompt);
        promptInput.value = '';
        sendBtn.querySelector('svg').style.fill = 'var(--text-muted)';

        // Lock UI
        promptInput.disabled = true;
        sendBtn.disabled = true;

        // Move thinking indicator to bottom and show
        chatBox.appendChild(thinkingIndicator);
        thinkingIndicator.style.display = 'flex';
        scrollToBottom();

        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: prompt })
            });

            if (!response.ok) throw new Error('Network error');

            const data = await response.json();

            // Hide thinking, show response
            thinkingIndicator.style.display = 'none';
            appendAiMessage(data.content);

        } catch (error) {
            thinkingIndicator.style.display = 'none';
            appendAiMessage("⚠️ An error occurred communicating with the server.");
        } finally {
            promptInput.disabled = false;
            sendBtn.disabled = false;
            promptInput.focus();
            scrollToBottom();
        }
    }

    function appendUserMessage(text) {
        const row = document.createElement('div');
        row.className = 'message-row user';
        row.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
        chatBox.insertBefore(row, thinkingIndicator);
    }

    function appendAiMessage(text) {
        const row = document.createElement('div');
        row.className = 'message-row ai';
        row.innerHTML = `
                <div class="avatar">
                    <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-8.5 13.5l-1.5-3-3-1.5 3-1.5 1.5-3 1.5 3 3 1.5-3 1.5-1.5 3z"/></svg>
                </div>
                <div class="bubble">${formatAiText(text)}</div>
            `;
        chatBox.insertBefore(row, thinkingIndicator);
    }

    function escapeHtml(unsafe) {
        return unsafe
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }

    // Simple formatter to convert markdown bold **text** to HTML <strong>text</strong>
    // and line breaks to <br>
    function formatAiText(text) {
        let formatted = escapeHtml(text);
        formatted = formatted.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        formatted = formatted.replace(/\n/g, '<br>');
        return formatted;
    }

    function scrollToBottom() {
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>
</body>
</html>
